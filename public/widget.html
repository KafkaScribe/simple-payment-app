<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Payment Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      padding: 20px;
      gap: 28px;
    }
    canvas { border-radius: 8px; }
    .download-btn {
      padding: 16px 44px;
      background: linear-gradient(135deg, #F7931A, #E8850F);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
      box-shadow: 0 4px 24px rgba(247, 147, 26, 0.3);
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(247, 147, 26, 0.5);
    }
    .hint { color: rgba(255,255,255,0.35); font-size: 13px; }
  </style>
</head>
<body>
  <canvas id="card" width="900" height="1100"></canvas>
  <button class="download-btn" onclick="downloadCard()">⬇  Download PNG</button>
  <p class="hint">Right-click the image to save, or tap the button above.</p>

  <script>
    const PAYMENT_URL = 'https://www.cash2pay.shop/$Payment';
    const DISPLAY_URL = 'https://cash2pay.shop/$Payment';

    async function drawCard() {
      const canvas = document.getElementById('card');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;

      // Pure black background
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, W, H);

      // "Cash Pay" title
      ctx.fillStyle = '#ffffff';
      ctx.font = '800 48px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Cash Pay', W / 2, 100);

      // URL below title
      ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
      ctx.font = '400 22px Inter, sans-serif';
      ctx.fillText(DISPLAY_URL, W / 2, 160);

      // QR code white background (rounded rect)
      const qrBgSize = 620;
      const qrBgX = (W - qrBgSize) / 2;
      const qrBgY = 220;
      const qrBgR = 32;
      const centerX = W / 2;
      const centerY = qrBgY + qrBgSize / 2;

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(qrBgX + qrBgR, qrBgY);
      ctx.lineTo(qrBgX + qrBgSize - qrBgR, qrBgY);
      ctx.quadraticCurveTo(qrBgX + qrBgSize, qrBgY, qrBgX + qrBgSize, qrBgY + qrBgR);
      ctx.lineTo(qrBgX + qrBgSize, qrBgY + qrBgSize - qrBgR);
      ctx.quadraticCurveTo(qrBgX + qrBgSize, qrBgY + qrBgSize, qrBgX + qrBgSize - qrBgR, qrBgY + qrBgSize);
      ctx.lineTo(qrBgX + qrBgR, qrBgY + qrBgSize);
      ctx.quadraticCurveTo(qrBgX, qrBgY + qrBgSize, qrBgX, qrBgY + qrBgSize - qrBgR);
      ctx.lineTo(qrBgX, qrBgY + qrBgR);
      ctx.quadraticCurveTo(qrBgX, qrBgY, qrBgX + qrBgR, qrBgY);
      ctx.closePath();
      ctx.fill();

      // Generate and draw QR code
      const qrPadding = 50;
      const qrSize = qrBgSize - qrPadding * 2;
      const qrX = qrBgX + qrPadding;
      const qrY = qrBgY + qrPadding;

      if (typeof QRCode === 'undefined') {
        console.error('QR error: QRCode library is not loaded.');
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 24px Inter, sans-serif';
        ctx.fillText('QR Code Library Error', W / 2, centerY);
        return;
      }

      try {
        const qrDataUrl = await QRCode.toDataURL(PAYMENT_URL, {
          width: qrSize,
          margin: 0,
          color: { dark: '#000000', light: '#ffffff' },
          errorCorrectionLevel: 'H'
        });
        const img = new Image();
        img.src = qrDataUrl;
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
        });
        ctx.drawImage(img, qrX, qrY, qrSize, qrSize);
      } catch (e) {
        console.error('QR error:', e);
        ctx.fillStyle = '#ff0000';
        ctx.font = 'bold 24px Inter, sans-serif';
        ctx.fillText('QR Code Generation Failed', W / 2, centerY);
      }

      // Bitcoin icon in center of QR (orange circle with ₿)
      const iconR = 38;

      // White circle behind (for QR clearance)
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(centerX, centerY, iconR + 10, 0, Math.PI * 2);
      ctx.fill();

      // Orange rounded square (like CashApp style)
      const sqSize = iconR * 2;
      const sqX = centerX - iconR;
      const sqY = centerY - iconR;
      const sqR = 14;

      const iconGrad = ctx.createLinearGradient(sqX, sqY, sqX + sqSize, sqY + sqSize);
      iconGrad.addColorStop(0, '#F7931A');
      iconGrad.addColorStop(1, '#E8850F');
      ctx.fillStyle = iconGrad;

      ctx.beginPath();
      ctx.moveTo(sqX + sqR, sqY);
      ctx.lineTo(sqX + sqSize - sqR, sqY);
      ctx.quadraticCurveTo(sqX + sqSize, sqY, sqX + sqSize, sqY + sqR);
      ctx.lineTo(sqX + sqSize, sqY + sqSize - sqR);
      ctx.quadraticCurveTo(sqX + sqSize, sqY + sqSize, sqX + sqSize - sqR, sqY + sqSize);
      ctx.lineTo(sqX + sqR, sqY + sqSize);
      ctx.quadraticCurveTo(sqX, sqY + sqSize, sqX, sqY + sqSize - sqR);
      ctx.lineTo(sqX, sqY + sqR);
      ctx.quadraticCurveTo(sqX, sqY, sqX + sqR, sqY);
      ctx.closePath();
      ctx.fill();

      // ₿ symbol
      ctx.fillStyle = '#ffffff';
      ctx.font = '800 42px Inter, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('₿', centerX, centerY + 2);

      // Bottom text
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      ctx.font = '500 16px Inter, sans-serif';
      ctx.fillText('Scan to pay with Bitcoin', W / 2, qrBgY + qrBgSize + 60);

      // Bottom bar
      ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
      ctx.fillRect((W - 60) / 2, H - 50, 60, 4);
    }

    function downloadCard() {
      const canvas = document.getElementById('card');
      const link = document.createElement('a');
      link.download = 'cashpay-payment-card.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    document.fonts.ready.then(() => drawCard());
  </script>
</body>
</html>
