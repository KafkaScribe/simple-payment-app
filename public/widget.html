<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay with Bitcoin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      padding: 20px;
    }

    .widget {
      width: 380px;
      background: linear-gradient(145deg, #1a1a2e 0%, #16162a 50%, #1a1a2e 100%);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(247, 147, 26, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(247, 147, 26, 0.05);
      position: relative;
    }

    .widget::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #F7931A, #FFB347, #F7931A);
    }

    /* Top Section */
    .widget-top {
      padding: 32px 28px 24px;
      text-align: center;
      position: relative;
    }

    .btc-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #F7931A, #E8850F);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 26px;
      font-weight: 800;
      color: white;
      box-shadow: 0 4px 20px rgba(247, 147, 26, 0.35);
    }

    .widget-name {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .widget-handle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 500;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(247, 147, 26, 0.15), transparent);
      margin: 0 28px;
    }

    /* Middle Section */
    .widget-body {
      padding: 24px 28px;
      text-align: center;
    }

    .pay-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .pay-description {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    /* Pay Button */
    .pay-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, #F7931A, #E8850F);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(247, 147, 26, 0.3);
      letter-spacing: 0.2px;
    }

    .pay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(247, 147, 26, 0.45);
      background: linear-gradient(135deg, #FFa02e, #F7931A);
    }

    .pay-btn:active {
      transform: translateY(0);
    }

    .pay-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Trust Section */
    .widget-footer {
      padding: 16px 28px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 500;
    }

    .trust-item svg {
      width: 13px;
      height: 13px;
      opacity: 0.6;
    }

    .trust-dot {
      width: 3px;
      height: 3px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
    }

    /* Pulse animation on icon */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(247, 147, 26, 0.4); }
      70% { box-shadow: 0 0 0 12px rgba(247, 147, 26, 0); }
      100% { box-shadow: 0 0 0 0 rgba(247, 147, 26, 0); }
    }

    .btc-icon {
      animation: pulse-ring 2.5s ease-out infinite;
    }

    /* Responsive */
    @media (max-width: 420px) {
      .widget { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="widget">
    <!-- Top -->
    <div class="widget-top">
      <div class="btc-icon">₿</div>
      <div class="widget-name">Payment</div>
      <div class="widget-handle">cash2pay.shop</div>
    </div>

    <div class="divider"></div>

    <!-- Body -->
    <div class="widget-body">
      <div class="pay-label">Pay with Bitcoin</div>
      <div class="pay-description">
        Tap below to send a secure<br>instant Bitcoin payment.
      </div>
      <a href="https://www.cash2pay.shop/$Payment" class="pay-btn" target="_blank">
        Pay Now
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
        </svg>
      </a>
    </div>

    <!-- Footer -->
    <div class="widget-footer">
      <span class="trust-item">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
        </svg>
        Secure
      </span>
      <span class="trust-dot"></span>
      <span class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5 14.25 2.25 12 10.5h6.75L3.75 22.5l2.25-9H3.75Z" />
        </svg>
        Instant
      </span>
      <span class="trust-dot"></span>
      <span class="trust-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />
        </svg>
        Verified
      </span>
    </div>
  </div>
</body>
</html>
